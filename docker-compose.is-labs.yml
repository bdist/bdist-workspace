volumes:
  pg_data: {}
  pgadmin_data: {}
  redis_data: {}

services:
  notebook:
    restart: unless-stopped
    image: quay.io/bdist/notebook:edge
    init: true
    volumes:
      - ./work:/home/jovyan/work
      - ../is-labs/data:/home/jovyan/data
      - ../is-labs/labs:/home/jovyan/labs
      - ../is-projects/project:/home/jovyan/project
    environment:
      - JUPYTER_PORT=${JUPYTER_PORT:-9999}
    ports:
      - "${JUPYTER_PORT:-9999}:${JUPYTER_PORT:-9999}"
    networks:
      - bdist-workspace-network

  redis:
    restart: unless-stopped
    image: redis:8
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bdist-workspace-network

  postgres:
    restart: unless-stopped
    image: postgres:18
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    shm_size: "256m"
    stop_grace_period: 30s
    volumes:
      - pg_data:/var/lib/postgresql:Z
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready -h 127.0.0.1 -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bdist-workspace-network

  pgadmin:
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    image: dpage/pgadmin4:9
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@tecnico.pt}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    networks:
      - bdist-workspace-network

  ngrok:
    restart: no
    image: ngrok/ngrok
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml
    ports:
      - "${NGROK_PORT:-4040}:4040"
    networks:
      - bdist-workspace-network

networks:
  bdist-workspace-network:
    driver: bridge

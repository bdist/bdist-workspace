# PostgreSQL runtime settings for bdist-workspace
# Profile: local learning workloads on modern laptop hardware (SSD assumed).

# -----------------------------------------------------------------------------
# Networking and access.
# -----------------------------------------------------------------------------
# Required in Docker so sibling containers can connect via service name.
listen_addresses = '*'

# -----------------------------------------------------------------------------
# Memory: conservative defaults to support concurrent notebook sessions.
# -----------------------------------------------------------------------------
shared_buffers = '1GB'

# Per operation memory for sorts/hashes. Keep moderate to avoid memory spikes
# when many queries run at the same time.
work_mem = '8MB'

# Memory for manual VACUUM/CREATE INDEX and autovacuum workers.
# These are higher than work_mem because maintenance tasks benefit from larger
# batches and are usually less latency sensitive.
maintenance_work_mem = '256MB'
autovacuum_work_mem = '128MB'

# -----------------------------------------------------------------------------
# Worker and parallelism limits.
# -----------------------------------------------------------------------------
# Moderate parallelism: enough for larger scans/aggregations without allowing a
# single query to consume all workers on a small machine.
max_worker_processes = 8
max_parallel_workers = 4
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# -----------------------------------------------------------------------------
# WAL and checkpoint behavior.
# -----------------------------------------------------------------------------
# Smoother write bursts and fewer tiny checkpoints.
wal_compression = on
max_wal_size = '2GB'
checkpoint_timeout = '15min'

# -----------------------------------------------------------------------------
# Planner behavior.
# -----------------------------------------------------------------------------
# JIT often hurts short, interactive queries typical in teaching environments.
jit = off

# Lower random_page_cost to reflect SSD random I/O performance.
random_page_cost = 1.1

# -----------------------------------------------------------------------------
# I/O concurrency and timing.
# -----------------------------------------------------------------------------
# Raise asynchronous read concurrency to better overlap I/O on SSD-backed
# systems. Tune down if you observe increased latency under heavy contention.
effective_io_concurrency = 200
maintenance_io_concurrency = 200

# Keep timing metrics enabled for EXPLAIN (ANALYZE, BUFFERS) lab exercises.
track_io_timing = on

# -----------------------------------------------------------------------------
# Extensions and observability.
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
